<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <!-- Tailwind & Custom CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./assets/css/style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="max-w-6xl mx-auto py-15 px-5">

    <!-- Header -->
    <header class="space-y-5">
        <h1 class="text-[#002c5c] text-[32px] font-bold leading-8">Job Application Tracker</h1>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div
                class="bg-white p-5 space-y-2 rounded-lg shadow-sm hover:shadow-md border border-[#f1f2f4] hover:border-[#3b82f6] hover:-translate-y-0.5 transition-all duration-300">
                <p class="text-sm text-[#323b49] font-medium leading-4.5">Total</p>
                <p id="total-app" class="text-[#002c5c] text-2xl font-bold leading-7.5">0</p>
            </div>
            <div
                class="bg-white p-5 space-y-2 rounded-lg shadow-sm hover:shadow-md border border-[#f1f2f4] hover:border-[#3b82f6] hover:-translate-y-0.5 transition-all duration-300">
                <p class="text-sm text-[#323b49] font-medium leading-4.5">Interview</p>
                <p id="interview-app" class="text-[#10B981] text-2xl font-bold leading-7.5">0</p>
            </div>
            <div
                class="bg-white p-5 space-y-2 rounded-lg shadow-sm hover:shadow-md border border-[#f1f2f4] hover:border-[#3b82f6] hover:-translate-y-0.5 transition-all duration-300">
                <p class="text-sm text-[#323b49] font-medium leading-4.5">Rejected</p>
                <p id="rejected-app" class="text-[#EF4444] text-2xl font-bold leading-7.5">0</p>
            </div>
        </div>
    </header>

    <!-- Divider -->
    <hr class="border-[#E6E7E9] my-7.5">

    <!-- Main Content -->
    <main>

        <!-- Title -->
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-[#002c5c] text-[20px] font-semibold leading-6">Available Jobs</h3>
            <p class="text-[#64748B] text-[16px] font-medium leading-5"><span id="total-jobs">0</span> jobs</p>
        </div>

        <!-- Filter Buttons -->
        <div id="filter-buttons" class="flex items-center gap-2 mb-4">
            <button id="all-filter-btn" onclick="toggleStyle('all-filter-btn')"
                class="bg-[#3b82f6] text-white text-[12px] font-medium text-center leading-none py-2 px-3 border border-[#f1f2f4] transition-colors duration-300 rounded-sm w-20 h-8 cursor-pointer">All</button>
            <button id="interview-filter-btn" onclick="toggleStyle('interview-filter-btn')"
                class="bg-white text-[#64748b] hover:text-[#3b82f6] text-[12px] font-medium text-center leading-none py-2 px-3 border border-[#f1f2f4] hover:border-[#3b82f6] transition-colors duration-300 rounded-sm w-20 h-8 cursor-pointer">Interview</button>
            <button id="rejected-filter-btn" onclick="toggleStyle('rejected-filter-btn')"
                class="bg-white text-[#64748b] hover:text-[#3b82f6] text-[12px] font-medium text-center leading-none py-2 px-3 border border-[#f1f2f4] hover:border-[#3b82f6] transition-colors duration-300 rounded-sm w-20 h-8 cursor-pointer">Rejected</button>
        </div>

        <!-- All Jobs -->
        <div id="all-jobs" class="space-y-4">

        </div>

        <!-- No Job Available -->
        <div id="no-jobs"
            class="bg-white h-100 hidden justify-center items-center flex-col gap-5 py-15 px-10 border border-[#f1f2f4] rounded-lg">
            <img src="./assets/img/jobs.svg" alt="No Jobs Available">
            <div class="text-center space-y-1">
                <p class="text-[#002c5c] text-[24px] font-semibold leading-8">No jobs available</p>
                <p class="text-[#64748b] leading-5.5">Check back soon for new job opportunities</p>
            </div>
        </div>

    </main>

    <!-- Scripts -->
    <script src="./assets/js/jobs.js"></script>
    <script src="./assets/js/scripts.js"></script>
</body>
</html>
